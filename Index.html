<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Exam Planner - Sai Subhash</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
            --sub-text: #1a237e;
            --border-color: #ddd;
            --clock-bg: #111;
            --clock-text: #0f0;
            --input-bg: #ffffff;
            --input-text: #333;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --sub-text: #9fa8da;
            --border-color: #333;
            --clock-bg: #000;
            --clock-text: #0f0;
            --input-bg: #222;
            --input-text: #0f0;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; transition: 0.3s; }
        .container { max-width: 850px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 15px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* BIG Live Clock */
        .live-clock-container { font-family: 'Courier New', monospace; font-size: 1.8rem; font-weight: 900; color: var(--sub-text); }
        .live-clock-container span { color: var(--text-color); }

        .theme-toggle { cursor: pointer; font-size: 1.8rem; color: var(--sub-text); border: none; background: none; }

        h1 { text-align: center; color: var(--sub-text); margin-bottom: 10px; text-transform: uppercase; font-size: 1.3rem; }
        
        /* Overall Progress Bar */
        .overall-progress-wrapper { margin-bottom: 25px; background: #eee; border-radius: 10px; height: 30px; overflow: hidden; position: relative; border: 1px solid var(--border-color); }
        .overall-bar { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); width: 0%; transition: width 0.5s ease; }
        .overall-text { position: absolute; width: 100%; text-align: center; top: 5px; font-weight: bold; color: #000; font-size: 0.9rem; }

        .section-box { background: var(--clock-bg); color: var(--clock-text); padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-family: 'Courier New', monospace; border: 4px solid #333; }
        .display-big { font-size: 2.2rem; margin-bottom: 10px; font-weight: bold; }
        
        /* Input Styling Fix */
        input { background: var(--input-bg); color: var(--input-text); border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; transition: 0.3s; }
        .section-box input { background: #222; color: #0f0; border: 1px solid #444; }

        .btn-action { background: #0f0; color: #000; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-stop { background: #e74c3c; color: white; display: none; width: 100%; padding: 12px; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }

        .row-item { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; justify-content: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(159, 168, 218, 0.15); padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); }
        .stat-box span { display: block; font-size: 1.4rem; font-weight: bold; color: var(--sub-text); }

        .subject-card { border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; margin-bottom: 20px; }
        .subject-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; }
        
        .btn-del { background: none; color: #888; border: none; cursor: pointer; font-size: 1.1rem; }
        .btn-del:hover { color: #ff5252; }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn-final { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }

        #feedbackCard { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; background: var(--card-bg); border-radius: 20px; padding: 30px; text-align: center; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.5); border: 8px solid #3498db; color: var(--text-color); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    </style>
</head>
<body data-theme="light"> <div class="overlay" id="overlay"></div>
<div id="feedbackCard">
    <h2 id="feedbackTitle">Status</h2>
    <p id="feedbackText"></p>
    <h3 id="feedbackPercent">0%</h3>
    <button onclick="closeCard()" style="padding: 10px 25px; margin-top: 20px; cursor: pointer; background: #333; color: #fff; border:none; border-radius:5px;">CLOSE</button>
</div>

<div class="container" id="captureArea">
    <div class="header-controls">
        <div class="live-clock-container">Time: <span id="liveClock">00:00:00 AM</span></div>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
    </div>

    <h1>Daily To Do list planner for Competitive Examinations</h1>

    <div class="overall-progress-wrapper">
        <div class="overall-bar" id="overallBar"></div>
        <div class="overall-text">OVERALL PROGRESS: <span id="overallPercText">0%</span></div>
    </div>

    <div class="section-box">
        <div style="font-size: 0.7rem; color: #888;">STUDY COUNTDOWN</div>
        <div class="display-big" id="timerDisplay">00:00:00</div>
        <div id="inputControls" class="row-item">
            <input type="number" id="alarmHrs" placeholder="HH" style="width:45px"> : 
            <input type="number" id="alarmMins" placeholder="MM" style="width:45px">
            <button class="btn-action" onclick="startTimer()">START</button>
        </div>
        <button class="btn-stop" id="stopBtn" onclick="stopAlarm()">STOP ALARM</button>
    </div>

    <div class="section-box" style="border-color: #3498db;">
        <div style="font-size: 0.7rem; color: #888;">REMINDERS</div>
        <div id="reminderList">
            <div class="row-item">
                <input type="text" class="task-input" placeholder="Message..." style="flex:2">
                <input type="time" class="rem-time-val">
                <button class="btn-action" style="background: #3498db; color:white" onclick="setReminder(this)">SET</button>
                <div style="width:25px"></div>
            </div>
        </div>
        <button onclick="addReminderRow()" style="background:none; border:1px dashed #0f0; color:#0f0; cursor:pointer; margin-top:10px; padding:5px 10px;">+ Add More Reminders</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box">Planned (H:M)<span id="totalPlanned">0h 0m</span></div>
        <div class="stat-box">Completed (H:M)<span id="totalCompleted">0h 0m</span></div>
    </div>

    <div id="subjectList"></div>

    <div class="button-group">
        <button class="btn-final" style="background: #1a237e;" onclick="saveAndEvaluate()">💾 SAVE SESSION</button>
        <button class="btn-final" style="background: #2e7d32;" onclick="takeScreenshot()">📸 Save Screenshot of your progress</button>
    </div>
</div>

<script>
    const subjects = ["Quantitative Aptitude", "Reasoning", "English", "General Awareness"];
    let timerInterval;
    const alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); 
    const reminderSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'); 
    alarmSound.loop = true;

    function updateLiveClock() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }
    setInterval(updateLiveClock, 1000);

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        if (body.getAttribute('data-theme') === 'dark') {
            body.setAttribute('data-theme', 'light');
            icon.className = 'fas fa-moon';
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
        }
    }

    function init() {
        const container = document.getElementById('subjectList');
        subjects.forEach(sub => {
            const id = sub.replace(/\s+/g, '');
            container.innerHTML += `<div class="subject-card"><div class="subject-header">
                <span style="font-weight:bold;">${sub}</span>
                <span id="perc-${id}" style="color:#2e7d32; font-weight:bold;">0%</span>
                <button onclick="addTask('${id}')" class="btn-add" style="cursor:pointer">+ Add</button>
            </div><div id="tasks-${id}"></div></div>`;
            addTask(id);
        });
    }

    function addTask(subId) {
        const div = document.createElement('div');
        div.className = 'row-item';
        div.innerHTML = `
            <input type="text" class="task-input" placeholder="Topic..." oninput="toggleCheck(this)" style="flex:3">
            <div style="display:flex; gap:5px;">
                <input type="number" class="h-in" placeholder="H" oninput="calculateAll()" style="width:35px">
                <input type="number" class="m-in" placeholder="M" oninput="calculateAll()" style="width:35px">
            </div>
            <input type="checkbox" disabled onchange="calculateAll(); updateSubProgress('${subId}')">
            <button class="btn-del" onclick="removeTask(this, '${subId}')"><i class="fas fa-trash-alt"></i></button>`;
        document.getElementById(`tasks-${subId}`).appendChild(div);
        calculateAll();
    }

    function removeTask(btn, subId) { btn.parentElement.remove(); calculateAll(); updateSubProgress(subId); }

    function calculateAll() {
        let tpM = 0, tcM = 0;
        document.querySelectorAll('.subject-card .row-item').forEach(row => {
            const h = parseInt(row.querySelector('.h-in').value) || 0, m = parseInt(row.querySelector('.m-in').value) || 0;
            const mins = (h * 60) + m; tpM += mins;
            if (row.querySelector('input[type="checkbox"]').checked) tcM += mins;
        });
        const overallPerc = tpM > 0 ? (tcM / tpM) * 100 : 0;
        const displayPerc = Math.min(Math.round(overallPerc), 100);
        document.getElementById('overallBar').style.width = displayPerc + '%';
        document.getElementById('overallPercText').innerText = displayPerc + '%';
        document.getElementById('totalPlanned').innerText = `${Math.floor(tpM/60)}h ${tpM%60}m`;
        document.getElementById('totalCompleted').innerText = `${Math.floor(tcM/60)}h ${tcM%60}m`;
        return displayPerc;
    }

    function saveAndEvaluate() {
        const perc = calculateAll();
        const card = document.getElementById('feedbackCard');
        document.getElementById('feedbackPercent').innerText = perc + "% Overall Completion";
        if (perc >= 100) { document.getElementById('feedbackTitle').innerText = "🏆 CHAMPION!"; document.getElementById('feedbackText').innerText = "Congratulations you achieved today!!"; }
        else if (perc >= 80) { document.getElementById('feedbackTitle').innerText = "🌟 VERY GOOD!"; document.getElementById('feedbackText').innerText = "Very Well done!"; }
        else if (perc >= 60) { document.getElementById('feedbackTitle').innerText = "📈 DECENT!"; document.getElementById('feedbackText').innerText = "Improve Yourself but Ok performance"; }
        else { document.getElementById('feedbackTitle').innerText = "⏳ PUSH HARDER!"; document.getElementById('feedbackText').innerText = "Better Luck Next Time"; }
        document.getElementById('overlay').style.display = 'block'; card.style.display = 'block';
    }

    function updateSubProgress(id) {
        const tasks = document.getElementById(`tasks-${id}`).querySelectorAll('.row-item'), checked = document.getElementById(`tasks-${id}`).querySelectorAll('input[type="checkbox"]:checked');
        document.getElementById(`perc-${id}`).innerText = tasks.length > 0 ? Math.round((checked.length/tasks.length)*100) + '%' : '0%';
    }

    function addReminderRow() {
        const div = document.createElement('div'); div.className = 'row-item';
        div.innerHTML = `<input type="text" class="task-input" placeholder="Message..." style="flex:2"><input type="time" class="rem-time-val"><button class="btn-action" style="background: #3498db; color:white" onclick="setReminder(this)">SET</button><button class="btn-del" onclick="this.parentElement.remove()"><i class="fas fa-trash-alt"></i></button>`;
        document.getElementById('reminderList').appendChild(div);
    }

    function setReminder(btn) {
        const row = btn.parentElement; const time = row.querySelector('.rem-time-val').value; const msg = row.querySelector('.task-input').value || "Reminder!";
        if (!time) return alert("Set time!");
        btn.innerText = "ACTIVE"; btn.style.background = "#27ae60";
        const checker = setInterval(() => {
            const currentStr = new Date().toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'});
            if (currentStr === time) { reminderSound.play(); alert(`🔔 REMINDER: ${msg}`); clearInterval(checker); btn.innerText = "SET"; btn.style.background = "#3498db"; }
        }, 10000);
    }

    function toggleCheck(input) { const cb = input.parentElement.querySelector('input[type="checkbox"]'); cb.disabled = input.value.trim() === ""; if (cb.disabled) cb.checked = false; calculateAll(); updateSubProgress(input.parentElement.parentElement.id.replace('tasks-', '')); }
    
    function startTimer() {
        let s = (parseInt(document.getElementById('alarmHrs').value)||0)*3600 + (parseInt(document.getElementById('alarmMins').value)||0)*60;
        if(s <= 0) return alert("Set time!");
        document.getElementById('inputControls').style.display = 'none';
        timerInterval = setInterval(() => { s--; if (s <= 0) { clearInterval(timerInterval); alarmSound.play(); document.getElementById('stopBtn').style.display = 'block'; return; }
        document.getElementById('timerDisplay').innerText = `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }, 1000);
    }

    function stopAlarm() { alarmSound.pause(); alarmSound.currentTime = 0; document.getElementById('stopBtn').style.display = 'none'; document.getElementById('inputControls').style.display = 'flex'; document.getElementById('timerDisplay').innerText = "00:00:00"; }
    function closeCard() { document.getElementById('feedbackCard').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function takeScreenshot() { html2canvas(document.getElementById('captureArea')).then(canvas => { const link = document.createElement('a'); link.download = `Study_Log.png`; link.href = canvas.toDataURL(); link.click(); }); }
    window.onload = init;
</script>
</body>
</html>
